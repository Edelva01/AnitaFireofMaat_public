<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AnitaFireofMaat</title>
  <style>
    :root {
      color-scheme: light;
      --banner-height: 52px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }

    .top-banner {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      height: var(--banner-height);
      width: 100%;
      border-bottom: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(15, 23, 42, 0.96);
      pointer-events: none;
    }

    .frame-wrap {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    .fallback {
      margin: 16px;
      font-size: 14px;
    }

  </style>
</head>
<body>
  <header class="top-banner" aria-hidden="true"></header>

  <main class="frame-wrap">
    <iframe
      src="https://fireofmaat.wixsite.com/my-site-1"
      title="Fire of Maat"
      loading="eager"
      allowfullscreen
    ></iframe>
  </main>

  <noscript>
    <p class="fallback">
      JavaScript is required for best experience. You can still visit
      <a href="https://fireofmaat.wixsite.com/my-site-1" target="_blank" rel="noopener noreferrer">the original site here</a>.
    </p>
  </noscript>
</body>
</html>
