<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fire of Ma'at</title>
  <link rel="icon" type="image/png" href="assets/icon.png" />
  <link rel="apple-touch-icon" href="assets/icon.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* page itself doesn't scroll; iframe handles its own scroll */
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      padding: 0;
      margin: 0;
      transform-origin: top center;
      overflow: auto;
    }
  </style>
</head>
<body>
  <iframe
    src="https://fireofmaat.wixsite.com/my-site-1"
    title="Fire of Maat"
    loading="eager"
    allowfullscreen
  ></iframe>

  <script>
    (function () {
      var frame = document.querySelector('iframe');

      // ─── PORTRAIT ────────────────────────────────────────────────────────────
      // Edit ONLY this function to adjust portrait behaviour.
      // Changes here have zero effect on landscape.
      function applyPortrait() {
        var vw = document.documentElement.clientWidth || window.innerWidth;
        var scale = vw / (vw - 70); // crops ~35px of Wix margin per side
        frame.style.transform = 'scale(' + scale.toFixed(3) + ')';
      }

      // ─── LANDSCAPE ───────────────────────────────────────────────────────────
      // Edit ONLY this function to adjust landscape behaviour.
      // Changes here have zero effect on portrait.
      function applyLandscape() {
        frame.style.transform = ''; // no adjustment — browser handles it naturally
      }

      // ─── ROUTER ──────────────────────────────────────────────────────────────
      // Detects orientation and calls the matching function. Do not edit this.
      function route() {
        var isPortrait = window.screen && window.screen.orientation
          ? window.screen.orientation.type.indexOf('portrait') === 0
          : window.innerHeight >= window.innerWidth;

        if (isPortrait) {
          applyPortrait();
        } else {
          applyLandscape();
        }
      }

      route();
      window.addEventListener('orientationchange', function () {
        setTimeout(route, 150);
      }, { passive: true });
      window.addEventListener('resize', route, { passive: true });
    })();
  </script>
</body>
</html>
