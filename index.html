<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fire of Ma'at</title>
  <link rel="icon" type="image/png" href="assets/icon.png" />
  <link rel="apple-touch-icon" href="assets/icon.png" />
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      transform-origin: top center;
    }
  </style>
</head>
<body>
  <iframe
    src="https://fireofmaat.wixsite.com/my-site-1"
    title="Fire of Maat"
    loading="eager"
    allowfullscreen
  ></iframe>

  <script>
    (function () {
      var frame = document.querySelector('iframe');

      function applyPortraitScale() {
        var isPortrait = window.screen && window.screen.orientation
          ? window.screen.orientation.type.indexOf('portrait') === 0
          : window.innerHeight >= window.innerWidth;

        if (isPortrait) {
          // Scale iframe to trim Wix's side margins and fill phone width.
          // Crop 70px total (35px per side) relative to current viewport width.
          var vw = document.documentElement.clientWidth || window.innerWidth;
          var scale = vw / (vw - 70);
          frame.style.transform = 'scale(' + scale.toFixed(3) + ')';
        } else {
          // Landscape: no adjustment — let the browser handle it naturally.
          frame.style.transform = '';
        }
      }

      applyPortraitScale();
      window.addEventListener('orientationchange', function () {
        setTimeout(applyPortraitScale, 150);
      }, { passive: true });
      window.addEventListener('resize', applyPortraitScale, { passive: true });
    })();
  </script>
</body>
</html>
